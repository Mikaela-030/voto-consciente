<html lang="pt-br">

    <title>Cadastre-se</title>
  </head>
  <body>
    <section class="container">
        

        <div>

        <form>
            <h2> Cadastro </h2>

            <label for="Nome" class="form-label"> Nome de Usuário</label> <!-- Nome -->
            
            
            <input type="text" class="form-control" placeholder="Digite seu nome de usuário">
            

            <label for="datadenascimento" class="form-label"> Data de Nascimento </label> <!-- Data de Nascimento -->
            


            <input type="date" class="form-control">
            

            <label for="cidade" class="form-label"> Cidade </label> <!-- Cidade -->
            
            
            <input type="text" placeholder="Digite sua cidade" class="form-control">
           

            <label for="email" class="form-label"> Email</label> <!-- Email -->
            
            
            <input type="email" placeholder="nomesobrenome@gmail.com" class="form-control">
            

            <label for="senha" class="form-label"> Senha</label> <!-- Nome -->
            
            
            <input type="password" placeholder="Digite Sua Senha" class="form-control">
            

            <button type="submit" class="btn btn-primary"> Cadastrar-se </button>
            

        </form>

        <aside>


        </aside>

        </div>

    </section>
</body>
